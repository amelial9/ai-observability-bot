services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - /home/ubuntu/otel/otel-splunk-4-5.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - observability-net
    restart: unless-stopped

  ai-observability-bot:
    build: .
    container_name: ai-observability-bot
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - observability-net
    volumes:
      - ./my_chroma_db:/app/my_chroma_db
    restart: unless-stopped
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  observability-net:
    driver: bridge
